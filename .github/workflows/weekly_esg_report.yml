name: ESG 주간 동향 리포트 자동 발송

on:
  schedule:
    - cron: '0 0 * * 6'  # 매주 토요일 09:00 KST (UTC 00:00)
  workflow_dispatch:       # GitHub에서 수동 테스트 실행 가능

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Korean fonts
        run: sudo apt-get install -y fonts-nanum

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate and send ESG report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAILS: ${{ secrets.TO_EMAILS }}
        run: python generate_and_send_report.py
