name: ESG Weekly Report

on:
  schedule:
    - cron: '0 0 * * 6'  # Every Saturday 09:00 KST (UTC 00:00)
  workflow_dispatch:

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Korean fonts
        run: sudo apt-get install -y fonts-nanum

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate and send ESG report
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAILS: ${{ secrets.TO_EMAILS }}
        run: python generate_and_send_report.py
